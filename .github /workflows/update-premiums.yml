name: Praemien aktualisieren

on:
  workflow_dispatch:
  push:
    paths:
      - "*.csv"
      - "process_premiums.py"
  schedule:
    - cron: "0 6 1,8,15,22 9,10 *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pandas
      - run: python process_premiums.py
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add kkPremiums.json
          git diff --staged --quiet || git commit -m "Praemien automatisch aktualisiert"
          git push
